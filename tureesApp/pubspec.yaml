name: turees_app
description: Turees - Property Rental Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP & Network
  dio: ^5.7.0

  # Secure Storage & Preferences
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Socket.io
  socket_io_client: ^2.0.3+1

  # UI & Design
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  badges: ^3.1.2

  # QR Code
  qr_flutter: ^4.1.0

  # Date & Time
  intl: ^0.19.0
  timeago: ^3.7.0

  # Image & File
  image_picker: ^1.1.2

  # Utilities
  equatable: ^2.0.7
  collection: ^1.18.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
