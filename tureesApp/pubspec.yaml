name: turees_app
description: Turees - Property Rental Management App
publish_to: "none"
version: 1.11.1+3

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP & Network
  dio: ^5.7.0

  # Secure Storage & Preferences
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Socket.io
  socket_io_client: ^2.0.3+1

  # UI & Design
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  badges: ^3.1.2

  # QR Code
  qr_flutter: ^4.1.0

  # Date & Time
  intl: ^0.19.0
  timeago: ^3.7.0

  # Image & File
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  path_provider: ^2.1.4

  # Audio recording & playback (voice messages)
  record: ^4.4.4
  audioplayers: ^6.1.0

  # Biometric Authentication
  local_auth: ^2.3.0

  # Push Notifications
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # Utilities
  equatable: ^2.0.7
  collection: ^1.18.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/rently.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
